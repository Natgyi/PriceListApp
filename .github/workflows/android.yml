name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # Gradle 8.4 အဖြစ် အသေသတ်မှတ်ပြီး Wrapper ဖိုင်ဆောက်ခြင်း
    - name: Auto-Generate Android Config & Wrapper
      run: |
        gradle wrapper --gradle-version 8.4
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        # Styles XML ကို ဆောက်ပေးခြင်း
        mkdir -p app/src/main/res/values
        cat << 'EOF' > app/src/main/res/values/styles.xml
        <resources>
            <style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.MaterialComponents.Light.NoActionBar"/>
        </resources>
        EOF

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PriceList-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
