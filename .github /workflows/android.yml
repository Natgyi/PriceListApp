name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # လက်နဲ့ နှိပ်ပြီး Build ချင်ရင် သုံးဖို့

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Debug APK
      run: bash ./gradlew assembleDebug || npx android-studio-build-cli || ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PriceList-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
